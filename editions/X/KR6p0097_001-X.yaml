body:
  text: 唐柳子厚著清釋實賢解東海若者昔有唐名儒柳子厚愍學佛者知見不同於淨土法門信毀不一其間利害不啻天淵欲令知所去取以造乎心性之極致故作此文也第習儒者既以佛理而置之弗究學佛者又以文字而漫不經心間有聰明之士多闕信根設具信根復無智慧致使深文奧義韜晦于殘編斷簡中莫之通達豈不惜哉因申明其義以為解釋庶幾為初機勸發之一助云東海若陸遊登孟諸之阿得二瓠焉刳而振其犀以嬉取海水雜糞壤蟯蚘而實之臭不可當也窒以密石舉而投之海逾時焉而過之曰是故棄糞邪東海若海神名喻宏法大士蓋海神主海猶大士主法故以此喻之也陸遊者謂離淨土海到娑婆岸猶海神離海而遊陸也孟諸地名曲阜曰阿高下不平之處以喻三界險道謂自既出生死復入三界度苦眾生故曰登孟諸之阿也二瓠喻信毀二機眾生五陰名之為瓠因緣會遇故言得刳而振其犀以嬉謂大士遊戲神通不取眾生相也刳空也振去也犀子也言空去其子以瓠𤬛為嬉正喻離眾生相以度生為遊戲也取海水者為說法也雜糞壤者眾生聞法智慧與無明雜也糞壤喻煩惱蟯蚘喻生死煩惱因果不出五濁生死種類不離十二臭猶苦也生死煩惱其苦難忍故言臭不可當密石喻根本無明一念不了故曰窒投海喻入生死眾生過去雖曾聞法種少善根但以無明所覆長在生死不得解脫縱遇知識勸導其根生熟不同亦有發不發者發則順教修行不發則違教執理故取二瓠為喻也然大士度生如父母教子不以孝子而偏教不以逆子而置之故雖不信亦為說法又常伺察其機而開發之逾時焉而過之者此伺機也久經輪轉故曰逾時夙緣相植故名曰過曰是故棄糞邪此開發之辭也謂汝于過去曾種善根今猶遺棄生死邪意欲令其發心念佛故問之也其一徹聲而呼曰我大海也此喻違教執理之人徹聲而呼即驚疑不信之狀我大海也即執理廢事之言東海若呀然笑曰怪矣今夫大海其東無東其西無西其北無北其南無南旦則浴日而出之夜則滔列星𣹢太陽揚陰火珠寶之光以為明其塵霾之雜不處也必汩之西澨故其大也深也潔也光明也無我若者此喻大士為說佛真性海以顯真諦也呀然張口貌怪矣是責之也今夫下具示正理夫性海無涯故無東西南北性海光明故外𣹢日月星辰內具眾寶外𣹢是神通內具是智慧所謂萬德悉圓也又日喻應身星月喻隨類化身應身出世名旦涅槃名夜應跡雖有生滅法體常自湛然眾生機熟則現佛身而度脫之緣盡入滅則又現隨類化身而引導之雖種種示現總皆不出性海之外是外𣹢也陰火喻神通珠寶喻定慧三皆全性發生是內具也性海清淨故塵霾不處塵霾指五住煩惱所謂諸惡都盡也太陰是月大海之中火光常起名為陰火澨水涯也謂大海不與塵霾同處必漂之涯岸猶佛智慧海不與煩惱同住必斷之令盡而後已耳深大光潔四字總結上文無四方是深天外𣹢內具是光無塵是潔無我若者是讚辭謂除佛已還皆未得此深大光潔之用者即有之是少分而已非究竟也今汝海之棄滴也而與糞壤同體臭朽之與曹蟯蚘之與居其狹咫也又冥暗若是而同之海不亦羞而可憐哉子欲之乎吾將為汝抉石破瓠盪羣穢于大荒之島而同子於向之所陳者可乎此喻斥其偏見而示以正修行路也夫眾生與佛雖同一心但眾生迷倒棄海認漚指漚為海聞說真海反以為非是則名為可憐愍者今夫執空之人計五陰身中方寸妄心謂是本來面目與佛無二如瓠中糞水計為大海與海無別不知心體廣大含裹十方虗空世界眾生諸佛一念徧收不局在方寸內如大海不局瓠𤬛內聞說西方淨土彌陀性海計為心外反生疑謗如聞真海反以為非彌陀雖不捨眾生眾生自棄耳如大海不拒一滴一滴自棄大海故曰海之棄滴眾生五陰煩惱為體故云糞壤同體臭即是苦朽即無常曹伍也言此身者無常眾若之為伴侶非真實也蟯身中蟲也喻十二類言此身者十二類之所同住非解脫也蕞爾六尺故言咫蒙然無智故言暗執此方寸妄心六尺妄身謂同佛妙用非顛倒耶故斥之曰羞而可憐問經云諸佛解脫當於眾生心行中求又云觀身實相觀佛亦然豈非眾生身心與佛無別而子乃欲分迷分悟論聖論凡得無眼見空華耶答如經所云葢是即妄觀真不執妄以為真如將一滴觀海不執一滴是海且如一滴之水與大海水濕性何別然既離大海又與糞壤交雜豈得謂之即是海耶即妄觀真而不執意亦如是故知水性無別而求歸海之計則可也若守定一滴謂為大海則不可也請試思之子欲之乎以下略示修行利益以勸之言吾將為汝者非是為彼修行蓋謂化功歸己利及他人也抉石喻斷根本無明破瓠喻出三界盪穢喻離五濁大荒喻寂光真境廓無際島喻同居極樂高出十方向之所陳即諸佛深大光潔之用知其不信而復強為說法者蓋大士悲心太切現雖無益亦為未來得度因緣也糞水泊然不說曰我固同矣吾又何求于若吾之性也亦若是而已矣穢者自穢不足以害吾潔狹者自狹不足以害吾廣幽者自幽不足以害吾明而穢亦海也狹幽亦海也突然而往于然而來孰非海者子去矣無亂我此喻聞教不信執辭以拒也博地凡夫雖有小慧不斷煩惱故名糞水聞教不信故云不說我固同矣此執理之言尅論理體生佛不二故曰固同吾又何求于若此自足之語前文所陳乃諸佛境界蓋是以修德而顯性德今執理者謬解單言性德而廢修德故曰吾之性也亦若是而已矣謂我心亦具深大光潔之用曾無欠少不知說食畫餅無益飢腸徒勞身口下文具出偏空之見穢不害潔言性體清淨不為生死所污也狹不害廣言性體廣大不為形器所局也幽不害明謂性體光明不為煩惱所覆也穢狹幽暗即具海之全體無二無別故云亦也突然于然往來貌以喻出沒生死皆本性妙理故云孰非海者問曰如上所陳未嘗不是何子過之深也答曰誠如所問其言雖是其意則非祗如三不害大乘經論中亦有此語然諸佛菩薩未嘗撥棄修行單言理性今謬人守定穢狹幽暗自謂光潔廣大不知煩惱現前潔斯害矣量不容物廣斯害矣顛倒是非明斯害矣現前一念尚不能保其無害況未來生死安能自知雖曰不害乃所以為大害也如諸佛菩薩有時化度眾生示現煩惱而心無分別斯真穢不害潔矣刀割香塗等無憎愛羅云調達並濟均慈斯真狹不害廣矣行於非道通達佛道斯真幽不害明矣而今乃以凡夫小智濫同佛智自取愆尤豈非謬之甚者邪子去矣無亂我是拒絕之辭蓋宗門執理之士乍聞教理輒大拂其心故云然也其一聞若之言號而祈曰吾毒是久矣吾以為是固然不可異也今于告我海之大又目我以故海之棄糞也吾愈急焉涌吾洙不足以發其窒旋吾波不足以穴瓠之腹也就能之窮歲月耳願若幸而哀我哉此喻順教修行之士初聞佛法生大悔悟心期解脫故號泣而祈求焉吾毒是久矣毒害也生死煩惱喪我法身亡我慧命名之曰毒沈淪多劫故曰久矣又言久者謂常有厭苦之心未得出離之路所謂善根將熟機欲發動也固然真實貌未聞教前意謂生死煩惱真實不可變異徒厭無益今聞佛功德海廣大難量則知生可作佛故曰告我以海之大又知夙曾下種與佛結緣我自迷背于佛遺棄生死故曰目我以故海棄糞是則出離有路解脫有方求之厭之當復彌切故云愈急下皆自知分量之辭涌洙喻小慧分別發窒喻破無明旋波喻微功轉動穴腹喻出三界就能之是假借之辭窮歲月是遷延曠劫幸而哀我是求佛攝受東海若乃抉石破瓠投之孟諸之陸盪其穢于大荒之島而水復於海盡得向之所陳者焉此喻順教修行之利無明頓破如抉石生死永亡如破瓠三界長揖故曰投之孟諸九蓮親到故曰大荒之島即凡心而見佛心故云水復于海而向之一者終與臭腐處而不變也此喻違教執空之害向執葫蘆之水與大海無別不知石未去而穢未除水未歸于海水雖無二寬狹淨穢乃殊又執穢狹皆海不知終于臭腐而不能變化豈不哀哉今夫執理者謂我心是佛何須更見彌陀即心淨土豈必更生極樂不知無明生死業相熾然雖有妙心尚未親證未得佛之大用又執生死煩惱皆是菩提涅槃誰非佛法不知生死現前依舊茫然無據何處當有涅槃無明瞥起仍復顛倒是非誰是菩提覺者一期浪語長劫沈淪能不為之痛心哉今有為佛者二人同出于毗盧遮那之海而泪于五濁之糞而幽于三有之瓠而窒于無明之石雜于十二類之蟯蚘人有問焉其一人曰我佛也毗盧遮那五濁三有無明十二類皆空也一切無善無惡無因無果無修無證無佛無眾生皆無焉吾何求也此合上文之譬也同是學佛知見不同故皆言為佛者二人即信毀二機毗盧遮那此云徧一切處是佛法身亦名真如性海此之法身生佛同體故言同出五濁者一劫濁乃至五命濁此五皆以染污為義故喻之如糞三有即三界謂欲色無色隔歷不同故名界因果不無故稱有三有區局眾生故喻如瓠四大區局六識義亦如是並得名焉無明窒礙法性故喻如石十二類不離三界如蟯蚘不離人腹人有問焉人即四依大士一人即違教執空之人我佛也合上我大海也一切皆空正是所執五濁空合上穢不足以害潔三有空合上狹不足以害廣無明十二類空合上幽不足以害明善是人天惡是三途因果修證通乎四聖此執空之人乃有兩種一者心自開解二者從他聞說心自解者病則難治從他聞者後或可醫問者曰子之所言性也有事焉夫性與事一而二二而一者也若守一而定則大患者至矣其人曰子去矣無亂我此示以正解而使知過患也言性有三義謂空義假義中義如向所陳但得空義不知中假又空有三種謂偏空斷空真空向論祇是偏空及以斷空尚未得真空之理豈知性者哉若悟真空自不撥無萬法是故知其未解也有事焉以下正是對病發藥之語性即理也謂理與事一而常二二而常一圓融則大功斯立守一則大患乃生得失在人非關佛法問何謂一而二二而一答如祖師云修證即不無染污即不得斯言是也夫修證即不無事也染污即不得理也二句義理互具互融不可偏廢上句具下義故無修證而論修證下句具上義故非染淨而說染淨此事理不二之旨也若單執有修證即同二乘權教單執無染污即同自然外道又同權教則唯尚功勛此過則淺同外道則撥無因果此害乃深故曰大患者至矣現在則失進修之利未來則招墮落之殃可不懼哉又祖師言句有言偏意圓者往往小慧之流隨語生解致使醍醐反成毒藥良可悲痛問云何名為言偏意圓答如誌公云五欲貪嗔是佛地獄即是天堂智者知心是佛愚人樂往西方是則名為言偏意圓也今當釋之謂若人能觀五欲境界及貪嗔癡如虗空華不生分別當知此人即名為佛故云五欲貪嗔是佛又觀地獄天堂苦樂之相如夢中事不於天堂而生愛著不於地獄而生驚怖二俱平等故云地獄即是天堂智者知心是佛愚人樂往西方此二句重在知心二字謂若知心是佛此人念佛即是智者不知則雖樂往西方亦是愚人智者指上上品愚人謂下下品此二語與淨土之旨初無悖戾而謬人執此乃謂念佛是愚人所為豈西方只有下下品而無上上品邪又下品者其在此土雖是愚人若生淨土則入不退地便不可謂之愚矣不知己愚反謂他愚謂之何哉故貴在得意忌在執文舉一例諸思之可見其一人曰嘻吾毒之久矣吾盡我力而不足以去無明窮吾智而不足以超三有離五濁而異夫十二類也就能之其大小劫之多不可知也若之何此明順教修行之士知力不足自審之辭也時丁末法人根轉鈍心膽轉粗大概而論有二種人謂一愚二狂愚者茫然無解固不待論矣狂者妄意高遠常欲躐等視此念佛法門不啻草芥尚生鄙恥況肯修行此無他不自知也古人云知人則智自知則明蓋當今之世自知者亦已鮮矣文中合譬一一可知言大小劫者人壽一增一減為一小劫積此小劫至八十番名一大劫又積此大小劫至不可數名一阿僧祇劫言不可知即是不可數藏教菩薩要經三無數劫修行方得成佛然退轉者多增進者少此明自力之難能也蓋一切法門皆自力出生死故難唯念佛一門兼仗他力故易易故一生可辦難故曠劫未成利害得失其機在此是故知難易則知利害知利害則知去取否則前途失足錯路者多矣正像之世容有自力出生死者末法之世罕聞此人今既自力不能欲求他力故問若何問者乃為陳西方之事使修念佛三昧一空有之說於是聖人憐之接而致之極樂之境而得以去羣惡集萬行居聖者之地同佛知見矣此明念佛之利也梵語三昧此云正受謂正念現前不受諸受故得此三昧者現前當來決定見佛一空有者謂無念而念無生而生也問空則一法不立有則萬法紛然二者乖角云何名一答昔天衣懷禪師開示淨土其言曰生則決定生去則實不去此一空有之旨也夫生則決定生有也去則實不去空也言雖有二意未嘗二也師又曰譬如鴈過長空影沈寒水鴈絕遺踪之意水無留影之心此自釋上文之辭也請以此喻分解之意自明矣夫行人五陰名之為鴈現前念佛之心本自豎窮橫徧故喻之以長空一期之身不久即滅故稱為過幻質雖有生滅念性元無生滅故名鴈過長空也清涼國土離諸熱惱故名寒水此方念佛彼土華開勤惰纔分榮枯頓異故曰影沈也又此土陰滅名鴈過彼土陰生名影沈此滅彼生曾無前後故得以喻之此二句釋上生則決定生也鴈絕遺踪之意此明眾生不往水無留影之心此明諸佛不來何以故若有去者即有程途有程途即有時分云何此滅彼生間不容髮若有來者即有足跡有足跡則此有彼無不能周徧云何十方應現接引同時當知法性如是非有非無豈容思議於其間哉此二句釋上云則實不去也但法中單明不去喻中兼顯不來是帶說耳問既云眾生不往又云諸佛不來則生西方者為復即在此處為復本無方所得非如夢所見非真實邪答不觀上影沈寒水之句乎言影沈寒水則顯西方實有化生之身但以求其往來之相本不可得故言不去不來子何迷悶之甚邪去羣惡是斷德集萬行是智德居聖地是四十一位真因同佛知見是開示悟入之理向之一人者終與十二類同而不變也此明不念佛之害言十二類者謂卵胎濕化有色無色乃至非有想非無想如楞嚴所明此之十二皆眾生數攝若證四果出三界則非十二類所能攝矣問參禪念佛均之為了生死吾人祗患心性未明心性苟明則孰非淨土三界本空何出之有十二類非實何同之有佛尚不可得何況眾生答如汝所言皆有名無義但取一時快論並不知利害也吾試問子汝證四果邪曰未也曰既未證四果則是凡夫盡此一生必受後有若受後有不在人天則在三途終不出十二類汝尚不能超欲界何況能出色無色界尚不能超三途況能超佛問聲聞證四果此身尚在豈非十二類攝答聲聞證四果身雖未滅不久即滅滅則受法性身居方便土出三界外譬如旅舍寄客不久出門其家眷屬不得以家人目之聲聞暫寄三界亦復如是問諸佛菩薩有時化度眾生示現世間必假胞胎父母豈非亦是胎生當何所攝答諸佛度生示理胞胎父母既云示現則雖有非實豈得實判眾生收歸十二類邪其寂光實報二土是佛菩薩本所住處此乃暫現耳間若爾何故經論中十法界總名眾生答此乃通論葢三乘人出三界尚有變易生死佛亦有常住五陰故得名焉今乃捨通從別祇論分投主死不論變易及以常住故不可以彼難此問西方淨土亦有化生豈非十二類攝答淨土雖有化生然身非分段純一化生故無十二類分是分限段是形段以彼土壽命無量故無分限形體無方變化不一若有若無故非形段況生彼土便入聖流直至成佛更不受身豈得名為十二類邪問禪宗悟達之士見性已徹其于三界不出不入于十二類不捨不受隨緣寄寓方便度生有何不可答悟達之士雖有見地不斷惑業若生三界一入胞胎便成隔陰從前所悟尋復忘失畢世工夫一朝唐喪可不惜哉更有業焉牽入異類汝又安能自主而不被惡報之所障邪若生彼土親近導師一入聖階便登佛地較之浮沈三界出入胞胎孰得孰失宜自思之故知不悟則已悟則求生西方當愈急焉如人得寶須覔善地藏之方得受用否則終致散失悟達往生亦復如是當知欲超生死無過淨土一門若在此土而能出離斷無是處願無爭口舌幸平氣而思之夫二人之相違也不若二瓠之水哉今不知去一而取一甚矣按下文當有其惑也三字此總結前文以明去取也夫像季之世豈唯宗教之士宗趣相違如二瓠之水即同一法門同一師學知見不同其類非一葢正見之難遇邪徒之易親亦已久矣今論去取宜知利害如上所陳信毀得失利害皎然何有智者而不知去取嗚呼今人莫不求利而常失利亦莫不避害而常遇害何哉大抵心不虗行不實知見不正故也是故修心之士務虗其心實其行端其知見以聖教為明鏡以師友為鞭䇿自始至終戰兢惕勵庶幾無大害矣否則終身受害恬然不知及其將死尚不自悟以至空過一生遺恨千古者多矣是皆不知去取也甚矣是責辭言智不如歸海葫蘆之水也可勝歎哉
